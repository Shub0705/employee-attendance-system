version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: attendance-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: attendance_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: attendance-backend

    ports:
      - "5000:5000"

    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: attendance_db

    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend

    container_name: attendance-frontend

    ports:
      - "80:80"

    depends_on:
      - backend

volumes:
  postgres_data:
